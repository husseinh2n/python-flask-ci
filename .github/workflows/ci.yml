name: Python CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x' # Use a specific version like '3.9', '3.10', '3.11' if needed

    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        # Include both requirements.txt and requirements-dev.txt in the hash for cache key
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install project dependencies
        if [ -f requirements.txt ]; then
          pip install -r requirements.txt
        else
          echo "requirements.txt not found. Skipping project dependency installation."
        fi
        # Install development/CI specific tools from requirements-dev.txt
        if [ -f requirements-dev.txt ]; then
          pip install -r requirements-dev.txt
        else
          echo "requirements-dev.txt not found. Skipping dev dependency installation."
        fi
        # pytest and flake8 are now installed via requirements-dev.txt,
        # so explicit installation here is no longer needed.

    - name: Run tests
      run: pytest

    - name: Lint code with Flake8
      run: flake8 .