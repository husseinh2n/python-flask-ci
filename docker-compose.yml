version: '3.8' # Specify the Docker Compose file format version

services:
  web: # Define a service named 'web'
    build: . # Instruct Docker Compose to build the image using the Dockerfile in the current directory
    ports:
      - "5000:5000" # Map port 5000 on the host to port 5000 in the container
    # The volumes mount is typically used for local development to hot-reload code changes.
    # For CI, it's best practice to test the self-contained Docker image as it would be deployed,
    # ensuring that the code copied into the image during the build is what's being run.
    # Therefore, the volume mount is removed for a more robust CI environment.
    # volumes:
    #   - .:/app
    # environment: # Optional: Set environment variables for the container
    #   FLASK_ENV: development # Example: Set Flask environment variable for development mode